<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alignment</title>
    <style>
      :root {
        --color-padding-area: #e557ef80;
        --aria-gradient: linear-gradient(-45deg, var(--color-padding-area) 10%, #0000 0, #0000 50%, var(--color-padding-area) 0, var(--color-padding-area) 60%, #0000 0, #0000);

        --color-teal-1: #0EB981;
        --color-teal-2: #0a825a;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }

      .grid-container {
        display: block grid;
        grid-template-columns: [col-start] repeat(3, 1fr) [col-end];
        gap: 1rem;
        background-image: var(--aria-gradient);
        background-size: 6px 6px;
      }

      .grid-item {
        text-align: center;
        padding: 2em;
        background-color: var(--color-teal-1);
        color: #fff;
        font-weight: 700;
        border-radius: 0.5rem;

        &:nth-child(5) {
          font-size: .75em;
          place-self: var(--align-self, auto) var(--justify-self, auto);
        }

      }

      .controller {
        margin-block-start: 4rem;

        pre {
          line-height: 2;
        }
      }

      .container {
        padding-inline: 4rem;
        padding-block: 4rem;
      }
    </style>
  </head>
  <body>

    <div class="">


      <div class="grid-container">
        <div class="grid-item">01</div>
        <div class="grid-item">02</div>
        <div class="grid-item">03</div>
        <div class="grid-item">04</div>
        <div class="grid-item">05</div>
        <div class="grid-item">06</div>
        <div class="grid-item">07</div>
        <div class="grid-item">08</div>
        <div class="grid-item">09</div>
      </div>
    </div>
    <div class="controller">
      <fieldset>
        <legend>コントローラー</legend>
        <pre><code>.grid-item:nth-child(5) {
  font-size: .75em;
  <label>justify-self: <select data-change="justify-self">
    <option>auto</option>
    <option>normal</option>
    <option>stretch</option>
    <optgroup label="self-position">
      <option>start</option>
      <option>end</option>
      <option>center</option>
      <option>self-start</option>
      <option>self-end</option>
      <option>flex-start</option>
      <option>flex-end</option>
    </optgroup>
    <optgroup label="baseline-position">
      <option>baseline</option>
      <option>first baseline</option>
      <option>last baseline</option>
    </optgroup>
    <option>left</option>
    <option>right</option>
  </select>;</label> /* インライン軸方向のアイテムの個別の位置揃え */
  <label>align-self: <select data-change="align-self">
    <option>auto</option>
    <option>normal</option>
    <option>stretch</option>
    <optgroup label="self-position">
      <option>start</option>
      <option>end</option>
      <option>center</option>
      <option>self-start</option>
      <option>self-end</option>
      <option>flex-start</option>
      <option>flex-end</option>
    </optgroup>
    <optgroup label="baseline-position">
      <option>baseline</option>
      <option>first baseline</option>
      <option>last baseline</option>
    </optgroup>
  </select>;</label> /* ブロック軸方向のアイテムの個別の位置揃え */
}</code></pre>
      </fieldset>
    </div>

    <script>
      const elems = {
        container: document.querySelectorAll('.grid-container'),
      }

      const controllers = {
        "align-self": document.querySelector('[data-change="align-self"]'),
        "justify-self": document.querySelector('[data-change="justify-self"]'),
      }

      const setValue = (target, value) => {
        elems.container?.forEach(elem => {
          elem?.style.setProperty(`--${target}`, value);
        })


      }

      for (const [elem] of Object.entries(controllers)) {


        controllers[elem]?.addEventListener('change', (e) => {
          console.log(e.currentTarget.value);
          setValue(elem, e.currentTarget.value);
        })
      }

    </script>
  </body>
</html>

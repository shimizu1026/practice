<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transform-style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&Kumbh+Sans:wght@100..900&display=swap" rel="stylesheet">
    <style>
      body,
      .controller * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :where(html) {
        font-family: "Kumbh Sans", sans-serif;
        line-height: 1.5;
        line-break: strict;
        overflow-wrap: anywhere;
      }

      :where(body) {
        min-block-size: 100vb;
        background-color: #fafafa;
      }

      .container {
        display: block grid;
        place-content: center;
        perspective: 800px;
      }

      .cube {
        margin-block-start: 6rem;
        display: block grid;
        inline-size: 100px;
        aspect-ratio: 1;
        perspective: var(--perspective, 500px);
        transform-style: var(--transform-style, preserve-3d);
        transition: 1s ease-in-out;
        transition-property: perspective;
        rotate: 1 2 1 45deg;

        body:has(input:checked) & {
          animation: rotate linear 6s infinite;
        }
      }

      .face {
        grid-area: 1 / 1;
        display: block grid;
        place-content: center;
        inline-size: 100px;
        aspect-ratio: 1;
        color: #fff;
        font-weight: 700;
      }

      .face:nth-child(1) {
        transform: translateZ(50px);
        background-color: #003;
      }

      .face:nth-child(2) {
        transform: rotateY(180deg) translateZ(50px);
        background-color: #030;
      }

      .face:nth-child(3) {
        transform: rotateY(-90deg) translateZ(50px);
        background-color: #300;
      }

      .face:nth-child(4) {
        transform: rotateY(90deg) translateZ(50px);
        background-color: #303;
      }

      .face:nth-child(5) {
        transform: rotateX(90deg) translateZ(50px);
        background-color: #033;
      }

      .face:nth-child(6) {
        transform: rotateX(-90deg) translateZ(50px);
        background-color: #330;
      }

      .center {
        margin-block-start: 2rem;
        text-align: center;
      }

      .controller {
        position: fixed;
        inset-inline: 0;
        inset-block-end: 0;
        padding: 2.5rem 2rem 2rem;
        background-color: #fff;
        box-shadow: 0 0 16px rgb(0 0 0 / 0.16);

        fieldset {
          border: none;
          letter-spacing: 0.05em;
        }

        fieldset p+p {
          margin-block-start: 0.5em;
        }

        code {
          font-size: 1rem;
          font-family: "JetBrains Mono", monospace;
        }

        input {
          font-family: inherit;
          padding: 0.25em;
          appearance: none;
          border: 1px solid #ddd;
          background-color: #fafafa;

          color: #f233a6;
        }

        legend {
          position: absolute;
          inset-inline-start: 0;
          inset-block-start: 0;
          background-color: #2f2f2f;
          color: #ccc;
          padding: 0.25em 0.5em;
          font-weight: 700;
          letter-spacing: 0.05em;
          font-size: 0.75rem;
        }
      }

      @keyframes rotate {
        from {
          rotate: 1 1 1 0deg;
        }

        to {
          rotate: 1 1 1 360deg;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="cube">
        <p class="face">Cube</p>
        <p class="face">Cube</p>
        <p class="face">Cube</p>
        <p class="face">Cube</p>
        <p class="face">Cube</p>
        <p class="face">Cube</p>
      </div>


    </div>

    <p class="center"><label>アニメーション: <input type="checkbox" name="animation" value="on"></label></p>


    <div class="controller">
      <fieldset>
        <legend>コントローラー</legend>
        <pre><code>.cube { 
  <label>perspective: <input type="text" data-change="perspective" value="500px" size="20"></label>;
  <label>transform-style: <select data-change="transform-style">
    <option>flat</option>
    <option selected>preserve-3d</option>
  </select></label>;
}</code></pre>

      </fieldset>
    </div>

    <script>
      const elems = {
        container: document.querySelectorAll('.cube'),
      }

      const controllers = {
        "perspective": document.querySelector('[data-change="perspective"]'),
        "transform-style": document.querySelector('[data-change="transform-style"]'),
      }

      const setValue = (target, value) => {
        elems.container?.forEach(elem => {
          elem?.style.setProperty(`--${target}`, value);
        })

      }

      for (const [elem] of Object.entries(controllers)) {


        controllers[elem]?.addEventListener('change', (e) => {

          setValue(elem, e.currentTarget.value);
        })
      }

    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メニュー | Dummy Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_01.css">
  </head>
  <body>
    <div class="container">
      <article class="card">
        <figure class="card-thumbnail">
          <img src="https://shibajuku.net/demo/assets/images/photo-coffee.webp" srcset="https://shibajuku.net/demo/assets/images/photo-coffee@2x.webp 2x" alt="厳選したコーヒー豆を使った淹れたてのブレンドコーヒー" width="360" height="240" />
        </figure>
        <div class="card-body">
          <h2 class="card-title">キミのブレンド</h2>
          <p class="card-label">おすすめ</p>
          <p class="card-text">あなたのためだけのブレンドコーヒーです。「いつもの。」のご注文を頂いてから、豆を厳選し、焙煎、ドリップします。</p>
        </div>
      </article>
    </div>
  </body>

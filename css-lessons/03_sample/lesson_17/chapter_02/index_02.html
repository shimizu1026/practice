<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z-index</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&Kumbh+Sans:wght@100..900&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :where(html) {
        font-family: "Kumbh Sans", sans-serif;
        line-height: 1.5;
        line-break: strict;
        overflow-wrap: anywhere;
      }

      :where(body) {
        min-block-size: 100vb;
      }

      .container {
        display: block flow-root;
      }

      .parent {
        position: absolute;
        z-index: var(--z-index);

        color: #fff;
        font-weight: 400;
        inline-size: 200px;
        block-size: 140px;
        letter-spacing: 0.05em;
        font-weight: 700;
        font-size: 1.25rem;
        padding: 0.25em .5rem;
      }

      .parent:nth-child(1) {
        --z-index: var(--z-index-1);

        inset-inline-start: 50px;
        inset-block-start: 50px;
        background-color: #08b6d4;
      }

      .parent:nth-child(2) {
        --z-index: var(--z-index-2);

        inset-inline-start: 150px;
        inset-block-start: 150px;
        background-color: #0eb981;
      }

      .child {
        position: absolute;
        inset-inline-end: 1em;
        inset-block-end: 1em;
        background-color: #f43f5e;
        font-size: 1rem;
        padding: 0.25em 0.5em;
        inline-size: 150px;
        block-size: 80px;
        z-index: var(--z-index);

      }

      .controller {
        position: fixed;
        inset-inline: 0;
        inset-block-end: 0;
        padding: 2.5rem 2rem 2rem;
        background-color: #fff;
        box-shadow: 0 0 16px rgb(0 0 0 / 0.16);
      }

      fieldset {
        border: none;
        letter-spacing: 0.05em;
      }

      fieldset p+p {
        margin-block-start: 0.5em;
      }

      code {
        font-size: 1rem;
        font-family: "JetBrains Mono", monospace;
      }

      input {
        font-family: inherit;
        padding: 0.25em;
        appearance: none;
        border: 1px solid #ddd;
        background-color: #fafafa;

        color: #f233a6;
      }

      legend {
        position: absolute;
        inset-inline-start: 0;
        inset-block-start: 0;
        background-color: #2f2f2f;
        color: #ccc;
        padding: 0.25em 0.5em;
        font-weight: 700;
        letter-spacing: 0.05em;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="parent" data-box="1">
        <p>auto</p>
        <div class="child" data-box="3">
          <p>auto</p>
        </div>
      </div>
      <div class="parent" data-box="2">
        <p>auto</p>
      </div>

    </div>


    <div class="controller">
      <fieldset>
        <legend>コントローラー</legend>
        <p>
          <label>
            <code>
              .parent:nth-child(1) {
            z-index: <input type="text" data-change="1" size="5" value="auto">
            ; } 
          </code>
          </label>
        </p>
        <p>
          <label>
            <code>
                .parent:nth-child(2) {
              z-index: <input type="text" data-change="2" size="5" value="auto">
              ; } 
            </code>
          </label>
        </p>
        <p>
          <label>
            <code>
                .child {
              z-index: <input type="text" data-change="3" size="5" value="auto">
              ; } 
            </code>
          </label>
        </p>
      </fieldset>
    </div>

    <script>
      const elems = {
        container: document.querySelectorAll('[data-box]'),
      }

      const controllers = {
        "1": document.querySelector('[data-change="1"]'),
        "2": document.querySelector('[data-change="2"]'),
        "3": document.querySelector('[data-change="3"]'),
      }

      const setValue = (target, value) => {
        elems.container?.forEach(elem => {
          if (elem.getAttribute('data-box') === target) {
            elem?.style.setProperty(`--z-index`, value);
            elem.querySelector('p').textContent = value;

          }

        })

      }

      for (const [elem] of Object.entries(controllers)) {


        controllers[elem]?.addEventListener('change', (e) => {

          setValue(elem, e.currentTarget.value);
        })
      }

    </script>
  </body>
</html>

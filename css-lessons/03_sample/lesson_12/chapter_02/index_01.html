<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-direction</title>
    <style>
      :root {
        --color-padding-area: #e557ef80;
        --aria-gradient: linear-gradient(-45deg, var(--color-padding-area) 10%, #0000 0, #0000 50%, var(--color-padding-area) 0, var(--color-padding-area) 60%, #0000 0, #0000);

        --color-teal-1: #0EB981;
        --color-teal-2: #0a825a;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }

      .flex-container {
        display: block flex;
        flex-direction: var(--direction);
        background-image: var(--aria-gradient);
        background-size: 6px 6px;
      }

      .flex-item {
        flex-basis: 100px;
        padding-block: 2.5rem;
        text-align: center;
        border: 1px solid var(--color-teal-2);
        background-color: var(--color-teal-1);
        color: #fff;
        font-weight: 700;
      }

      .controller {
        margin-block-start: 4rem;
      }
    </style>
  </head>
  <body>
    <div class="flex-container">
      <div class="flex-item">01</div>
      <div class="flex-item">02</div>
      <div class="flex-item">03</div>
    </div>


    <div class="controller">
      <fieldset>
        <legend>コントローラー</legend>
        <p>
          <label>
            <code>flex-direction</code>:
            <select data-change="container">
              <option>row</option>
              <option>row-reverse</option>
              <option>column</option>
              <option>column-reverse</option>
            </select>
          </label>
        </p>

      </fieldset>
    </div>

    <script>
      const elems = {
        container: document.querySelectorAll('.flex-container'),
      }

      const controllers = {
        container: document.querySelector('[data-change="container"]'),
      }

      const setValue = (target, value) => {
        elems[target]?.forEach(elem => {
          elem?.style.setProperty("--direction", value);
        })


      }

      for (const [elem] of Object.entries(controllers)) {


        controllers[elem]?.addEventListener('change', (e) => {
          console.log(e.currentTarget.value);
          setValue(elem, e.currentTarget.value);
        })
      }


    </script>
  </body>
</html>

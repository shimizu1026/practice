<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gird-template</title>
    <style>
      :root {
        --color-padding-area: #e557ef80;
        --aria-gradient: linear-gradient(-45deg, var(--color-padding-area) 10%, #0000 0, #0000 50%, var(--color-padding-area) 0, var(--color-padding-area) 60%, #0000 0, #0000);

        --color-teal-1: #0EB981;
        --color-teal-2: #0a825a;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }

      .grid-container {
        display: block grid;
        grid-template:
          "header header" auto
          /* エリアの名前 行のサイズ */
          "contents side" 1fr
          /* エリアの名前 行のサイズ */
          "footer footer" auto /
          /* エリアの名前 行のサイズ */
          1fr minmax(240px, 30%);
        /* 列のサイズ 列のサイズ */
        gap: 1.5rem;
        background-image: var(--aria-gradient);
        background-size: 6px 6px;

        >* {
          text-align: center;
          padding: 2em;
          background-color: var(--color-teal-1);
          color: #fff;
          font-weight: 700;
          border-radius: 0.5rem;
        }
      }

      .header {
        grid-area: header;
      }

      .contents {
        grid-area: contents;
      }

      .side {
        grid-area: side;
      }

      .footer {
        grid-area: footer;
      }

      .controller {
        margin-block-start: 4rem;

        pre {
          line-height: 2;
        }
      }

      .container {
        padding-inline: 4rem;
        padding-block: 4rem;
      }
    </style>
  </head>
  <body>


    <div class="grid-container">
      <header class="header">Header</header>
      <main class="main">
        <div class="contents">Contents</div>
        <aside class="side">Side</aside>
      </main>
      <footer class="footer">Footer</footer>
    </div>


  </body>
</html>

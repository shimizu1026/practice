<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メニュー | Dummy Cafe</title>
    <link rel="stylesheet" href="style_01.css">
  </head>
  <body>
    <div class="container">
      <div class="grid-container">
        <article class="grid-item">
          <h3>キミのブレンドコーヒー</h3>
          <p>あなたのためだけのブレンドコーヒーです。あなたのお好みに合わせたコーヒー豆をその場で厳選し、お好みの苦さに焙煎します。そしてあなたの目の前でお好み粗さに豆を挽き、ドリップしてご提供します。</p>
          <p>450円</p>
        </article>
        <article class="grid-item">
          <h3>ダミーブレンドコーヒー</h3>
          <p>Dummy Cafeオリジナルのブレンドコーヒーです。苦さと渋さのバランスがとれた奥深い味わいになっています。</p>
          <p>420円</p>
        </article>
        <article class="grid-item">
          <h3>スペシャルブレンドコーヒー</h3>
          <p>その日の豆の状態でブレンドする豆を決めている日替わりのブレンドコーヒーです。その日によって使う豆の種類や量が異なるため、奇跡の一杯に出会えるかもしれません。</p>
          <p>420円</p>
        </article>
      </div>
    </div>
  </body>
</html>

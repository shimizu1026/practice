<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background-blend-mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&Kumbh+Sans:wght@100..900&display=swap" rel="stylesheet">
    <style>
      body,
      .controller * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :where(html) {
        font-family: "Kumbh Sans", sans-serif;
        line-height: 1.5;
        line-break: strict;
        overflow-wrap: anywhere;
      }

      :where(body) {
        min-block-size: 100vb;
        background-color: #fafafa;
      }

      :where(figure) {
        margin: 0;
        padding: 0;
      }

      :where(img) {
        max-inline-size: 100%;
        block-size: auto;
      }

      .container {
        display: block grid;
        place-content: center;
      }

      .box {
        display: block grid;
        place-content: center;
        margin-block-start: 8rem;
        text-align: center;
        letter-spacing: 0.05em;
        font-size: 1.5rem;
        font-weight: 900;
        inline-size: 300px;
        aspect-ratio: 1;
        background-color: #ddd;
        background-image: linear-gradient(to right, green, yellow), linear-gradient(red, blue);
        background-blend-mode: var(--background-blend-mode, overlay);
      }

      .controller {
        position: fixed;
        inset-inline: 0;
        inset-block-end: 0;
        padding: 2.5rem 2rem 2rem;
        background-color: #fff;
        box-shadow: 0 0 16px rgb(0 0 0 / 0.16);
      }

      fieldset {
        border: none;
        letter-spacing: 0.05em;
      }

      fieldset p+p {
        margin-block-start: 0.5em;
      }

      code {
        font-size: 1rem;
        font-family: "JetBrains Mono", monospace;
      }

      input {
        font-family: inherit;
        padding: 0.25em;
        appearance: none;
        border: 1px solid #ddd;
        background-color: #fafafa;

        color: #f233a6;
      }

      legend {
        position: absolute;
        inset-inline-start: 0;
        inset-block-start: 0;
        background-color: #2f2f2f;
        color: #ccc;
        padding: 0.25em 0.5em;
        font-weight: 700;
        letter-spacing: 0.05em;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        Box
      </div>
    </div>


    <div class="controller">
      <fieldset>
        <legend>コントローラー</legend>
        <p>

          <code>
             .box {
            <label>background-blend-mode: <select  data-change="background-blend-mode">
              <option>normal</option>
              <optgroup label="暗い効果">
                <option>darken</option>
                <option>multiply</option>
                <option>color-burn</option>
              </optgroup>
              <optgroup label="明るい効果">
                <option>lighten</option>
                <option>screen</option>
                <option>color-dodge</option>
              </optgroup>
              <optgroup label="コントラスト">
                <option selected>overlay</option>
                <option>soft-light</option>
                <option>hard-light</option>
              </optgroup>
              <optgroup label="差分">
                <option>difference</option>
                <option>exclusion</option>
              </optgroup>
              <optgroup label="色">
                <option>hue</option>
                <option>saturation</option>
                <option>color</option>
                <option>luminosity</option>
              </optgroup>
              </select>
            ;</label> } 
          </code>

        </p>

      </fieldset>
    </div>

    <script>
      const elems = {
        container: document.querySelectorAll('.box'),
      }

      const controllers = {
        "background-blend-mode": document.querySelector('[data-change="background-blend-mode"]'),
      }

      const setValue = (target, value) => {
        elems.container?.forEach(elem => {
          elem?.style.setProperty(`--${target}`, value);
        })

      }

      for (const [elem] of Object.entries(controllers)) {


        controllers[elem]?.addEventListener('change', (e) => {

          setValue(elem, e.currentTarget.value);
        })
      }

    </script>
  </body>
</html>

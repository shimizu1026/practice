<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Dummy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="header">
      <h1>
        <img src="https://shibajuku.net/demo/assets/images/logo-dummy-cafe.svg" alt="Dummy Cafe" width="200" height="160" decoding="async" class="logo">
      </h1>

      <nav class="header-nav" aria-label="メインメニュー">
        <button type="button" class="button-hamburger" aria-label="メニュー">
          <svg height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed">
            <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
          </svg>
        </button>
        <ul class="global-nav">
          <li><a href="#">Concept</a></li>
          <li><a href="#">Menu</a></li>
          <li><a href="#">Access</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="section">
        <div class="container">

          <h2 class="heading">Menu</h2>

          <ul class="menu">
            <li class="menu-item">
              <a href="#" class="card">
                <figure class="card-figure">
                  <img src="https://shibajuku.net/demo/assets/images/photo-coffee.webp" srcset="https://shibajuku.net/demo/assets/images/photo-coffee@2x.webp 2x" alt="厳選したコーヒー豆を使った淹れたてのブレンドコーヒー" width="480" height="320" decoding="async">
                  <figcaption class="card-caption">キミのブレンドコーヒー</figcaption>
                </figure>
              </a>
            </li>
            <li class="menu-item">
              <a href="#" class="card">
                <figure class="card-figure">
                  <img src="https://shibajuku.net/demo/assets/images/photo-egg-sandwich.webp" srcset="https://shibajuku.net/demo/assets/images/photo-egg-sandwich@2x.webp 2x" alt="パンの上にレタス、その上にとろけたチーズ、一番上に胡椒がかかった半熟の目玉焼きが乗っているたまごサンドが2つお皿に盛り付けられている。" width="480" height="320" decoding="async">
                  <figcaption class="card-caption">オリジナルたまごサンド</figcaption>
                </figure>
              </a>
            </li>
            <li class="menu-item">
              <a href="" class="card">
                <figure class="card-figure">
                  <img src="https://shibajuku.net/demo/assets/images/photo-carbonara.webp" srcset="https://shibajuku.net/demo/assets/images/photo-carbonara@2x.webp 2x" alt="ソールが少し絡んだ細めのパスタのカルボナーラ。パスタの上には薄切りのベーコン、パルメザンチーズがあり、パセリが添えられている。" width="480" height="320" decoding="async">
                  <figcaption class="card-caption">キミのカルボナーラ</figcaption>
                </figure>
              </a>
            </li>
          </ul>
        </div>
      </section>

    </main>
    <footer class="footer">
      <p><small>©︎ 2024 Dummy Cafe</small></p>
    </footer>

  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詳細度3</title>
    <style>
      p[id] {
        color: red;
        /* 0-1-1 */
      }

      p.text:first-child {
        color: green;
        /* 0-2-1 */
      }

      #content {
        color: blue;
        /* 1-0-0 */
      }
    </style>
  </head>
  <body>
    <div id="container">
      <p id="content" class="text">
        さて、俺は何色だ！
      </p>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詳細度1</title>
    <style>
      p {
        color: red;
        /* 0-0-1 */
      }

      .text {
        color: green;
        /* 0-1-0 */
      }

      #content {
        color: blue;
        /* 1-0-0 */
      }
    </style>
  </head>
  <body>
    <p id="content" class="text">
      さて、俺は何色だ！
    </p>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詳細度4</title>
    <style>
      p:is(.text, #content) {
        color: red;
        /* 1-0-1 */
      }

      p:where(.text, #content) {
        color: green;
        /* 0-0-1 */
      }

      p,
      .text,
      #content {
        color: blue;
        /* 0-0-1 、 0-1-0 、 1-0-0 */
      }
    </style>
  </head>
  <body>
    <div id="container">
      <p id="content" class="text">
        さて、俺は何色だ！
      </p>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詳細度のテスト</title>
    <style>
      #container>p:where(#content) {
        color: red;
      }

      html body div[id]>p[class][id].text:first-child {
        color: green;
      }

      :is(#container, #content, .text, p[class]) {
        color: blue;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <p id="content" class="text">
        さて、俺は何色だ！
      </p>
    </div>
  </body>
</html>

  <body>
    <div class="container">
      <h1 class="page-title">こだわり</h1>
      <div class="contents">
        <figure class="photo">
          <img src="https://shibajuku.net/demo/assets/images/photo-coffee.webp" srcset="https://shibajuku.net/demo/assets/images/photo-coffee@2x.webp 2x" alt="厳選したコーヒー豆を使った淹れたてのブレンドコーヒー" width="360" height="240" />
        </figure>
        <p class="text">Dummy Cafeは1杯のコーヒーにこだわりを持っています。当店では、お客様から「いつもの。」というご注文を承ってから、その日のお客様の体調や気分などに合わせて、一番ベストなコーヒー豆を一粒一粒厳選しています。そして、厳選したコーヒー豆をお客様のお好みに合わせて焙煎し、お客様専用のミルで気持ちを込めてコーヒー豆を挽いていてます。また、ドリップする温度も93°にこだわっており、1°でも温度がずれたらまたコーヒー豆を焙煎するところからやり直しています。そのため、コーヒーをお客様にご提供するまでのお時間は少々かかりますが、他では体験できない最高の1杯をご提供することができます。</p>
      </div>
    </div>
  </body>

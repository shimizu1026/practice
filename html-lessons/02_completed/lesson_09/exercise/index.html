<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Recruit | Dummy Creations</title>
  </head>
  <body>
    <h1>Recruit</h1>

    <h2>募集内容</h2>
    <table>
      <caption>求人票</caption>
      <thead>
        <tr>
          <th scope="col">職種</th>
          <th scope="col">仕事内容</th>
          <th scope="col">応募資格</th>
          <th scope="col">募集人数</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="row">Webディレクター</th>
          <td>企画立案やプロジェクトの進捗管理</td>
          <td>
            <ul>
              <li>Webに関する幅広い知識がある方</li>
              <li>コミュニケーションが得意な方</li>
            </ul>
          </td>
          <td>2人</td>
        </tr>
        <tr>
          <th scope="row">Webデザイナー</th>
          <td>未来を変えるWebサイトのデザイン</td>
          <td>
            <ul>
              <li>PhotoshopやXD、Figmaなどの操作が出来る方</li>
              <li>未来を変えるデザインが出来る方</li>
            </ul>
          </td>
          <td>1人</td>
        </tr>
        <tr>
          <th scope="row">フロントエンドエンジニア</th>
          <td>HTML、CSS、JavaScriptなどを用いた開発</td>
          <td>
            <ul>
              <li>HTML、CSS、JavaScriptを使った開発が出来る方</li>
              <li>新しい技術を積極的に取り入れられる方</li>
            </ul>
          </td>
          <td>2人</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>

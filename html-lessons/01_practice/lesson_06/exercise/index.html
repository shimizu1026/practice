<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Dummy Creations | 架空サイトを作る架空のWeb制作会社</title>
  </head>
  <body>
    <h1>
      <a href="./"
        ><img
          src="images/logo-dummy-creations.svg"
          alt="Dummy Creations"
          width="323"
          height="32"
          decoding="async"
      /></a>
    </h1>

    <ul>
      <li><a href="about/">About Us</a></li>
      <li><a href="service/">Service</a></li>
      <li><a href="works/">Works</a></li>
      <li><a href="contact/">Contact</a></li>
    </ul>

    <p>私たちは<em>架空サイト</em>を作ることに、命を燃やすプロ集団です。</p>

    <h2>制作実績</h2>

    <h3>Dummy Kitchen様</h3>
    <p>
      架空の料理レシピサイトである、Dummy
      Kitchen様のWebサイトを制作させて頂きました。
    </p>

    <h4>担当</h4>
    <ul>
      <li>ディレクション</li>
      <li>デザイン</li>
      <li>コーディング</li>
    </ul>

    <picture>
      <source
        srcset="
          images/thumbnail-dummy-kitchen.avif,
          images/thumbnail-dummy-kitchen@2x.avif 2x
        "
        type="image/avif"
      />
      <source
        srcset="
          images/thumbnail-dummy-kitchen.webp,
          images/thumbnail-dummy-kitchen@2x.webp 2x
        "
        type="image/webp"
      />
      <img
        src="images/thumbnail-dummy-kitchen.jpg"
        srcset="images/thumbnail-dummy-kitchen@2x.jpg 2x"
        alt="Dummy Kitchen様のWebサイトの画像"
        width="580"
        height="358"
        decoding="async"
        loading="lazy"
      />
    </picture>

    <h2>会社情報</h2>
    <p>住所：東京都架空区架空町1-1</p>

    <p>
      <small>© <time>2023</time> <a href="contact/">Dummy Creations</a></small>
    </p>
  </body>
</html>

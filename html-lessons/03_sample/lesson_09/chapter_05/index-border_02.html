<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>全国売上| 管理画面 | Dummy Cafe</title>
    <style>
      table {
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid #000;
        padding: .5em;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>全国売上表</caption>
      <thead>
        <tr>
          <th rowspan="2" colspan="2"></th>
          <th colspan="3" scope="colgroup">売上</th>
        </tr>
        <tr>
          <th scope="col">2021</th>
          <th scope="col">2022</th>
          <th scope="col">2023</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th rowspan="2" scope="rowgroup">東京</th>
          <th scope="row">本店</th>
          <td>926万円</td>
          <td>1005万円</td>
          <td>1422万円</td>
        </tr>
        <tr>
          <th scope="row">渋谷店</th>
          <td>771万円</td>
          <td>760万円</td>
          <td>801万円</td>
        </tr>
        <tr>
          <th rowspan="2" scope="rowgroup">大阪</th>
          <th scope="row">梅田店</th>
          <td>725万円</td>
          <td>821万円</td>
          <td>650万円</td>
        </tr>
        <tr>
          <th scope="row">難波店</th>
          <td>804万円</td>
          <td>720万円</td>
          <td>588万円</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>

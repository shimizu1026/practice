    <h1>よくある質問</h1>

    <details>
      <summary>本当に1度お店に行っただけで「いつもの」が通じますか？</summary>
      はい。1度でもご来店頂いたお客様は「いつもの」というたったひとつの言葉で、お客様のお好みのコーヒーをご提供致します。
    </details>
    <details>
      <summary>「いつもの」と注文したら、いつもと違うコーヒーが来た</summary>
      申し訳ございません。人間の記憶というのは曖昧なもので、間違ったコーヒーを提供してしまうことも度々あります。
    </details>

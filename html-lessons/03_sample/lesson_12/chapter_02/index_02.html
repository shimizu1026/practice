<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title> Dummy Cafe</title>
  </head>
  <body>

    <dialog open aria-label="利用規約への同意">

      <div autofocus>
        <p>当サイトを利用するには、当サイトの利用規約に同意して頂く必要があります。</p>
      </div>

      <form method="dialog">
        <button type="submit" value="agree">同意</button>
        <button type="submit" value="disagree">拒否</button>
      </form>
    </dialog>

    <p>
      Dummy Cafeに一度でもご来店頂いたお客様は、次回から「いつもの。」でご注文頂けます。 もちろんあなたのお好きな、コーヒーの苦さ、お砂糖やミルクの量もちゃんと把握しています。 あなたがDummy
      Cafeにいる間は、「いつもの。」というたったひとつの魔法の言葉で全てが通じる。そんな架空のサービスを提供しています。
    </p>
  </body>
</html>

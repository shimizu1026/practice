<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>autocapitalize</title>
  </head>
  <body>
    <form>
      <p>
        off or none: <input type="text" name="none" autocapitalize="off">
      </p>
      <p>
        on or sentences: <input type="text" name="text" autocapitalize="on">
      </p>
      <p>
        words: <input type="text" name="text" autocapitalize="words">
      </p>
      <p>
        characters: <input type="text" name="text" autocapitalize="characters">
      </p>
    </form>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>新規登録 | Dummy Cafe</title>
  </head>
  <body>
    <form action="receive.php" method="post">
      <p>
        ユーザー名（必須項目）：
        <input type="text" name="name" autocomplete="username" autocapitalize="off" autocorrect="off" required>

        <input type="email" name="email" autocomplete="email" inputmode="email" required>

    </form>
  </body>
</html>

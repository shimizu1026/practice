<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inputmode</title>
  </head>
  <body>
    <form>
      <p>
        none: <input type="text" name="none" inputmode="none">
      </p>
      <p>
        text: <input type="text" name="text" inputmode="text">
      </p>
      <p>
        url: <input type="url" name="url" autocomplete="url" inputmode="url">
      </p>
      <p>
        email: <input type="email" name="email" autocomplete="email" inputmode="email">
      </p>
      <p>
        numeric: <input type="text" name="numeric" inputmode="numeric">
      </p>
      <p>
        decimal: <input type="text" name="decimal" inputmode="decimal">
      </p>
      <p>
        search: <input type="search" name="search" inputmode="search">
      </p>
    </form>
  </body>
</html>

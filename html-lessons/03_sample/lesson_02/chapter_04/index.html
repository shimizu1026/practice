  <body>
    <p>常連さんがSNSで以下のような投稿をしてくれていました。</p>

      <p>
        Dummy Cafeはコーヒーも美味しいし、最高の時間を過ごせる素敵なカフェだ。
      </p>
    </blockquote>

    <pre role="img" aria-label="アスキーアートのうさぎ">
    (\ (\
    („• ֊ •„)
      O🤍O
    </pre>

    <p>夏場にはアイスコーヒーがおすすめです。</p>
    <hr />
